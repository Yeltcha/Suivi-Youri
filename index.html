              ${exercise.sets.map((set, setIndex) => {
                const previousSet = previous?.sets?.[setIndex];
                return `<div class="set-block"><div class="set-grid set-row"><span class="set-index">${setIndex + 1}</span><input aria-label="Charge série ${setIndex + 1}" type="number" inputmode="decimal" min="0" step="0.5" placeholder="${esc(previousSet?.weight ?? "—")}" value="${esc(set.weight)}" data-set-field="weight" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}"><input aria-label="Répétitions série ${setIndex + 1}" type="number" inputmode="numeric" min="0" max="100" placeholder="${esc(previousSet?.reps ?? "—")}" value="${esc(set.reps)}" data-set-field="reps" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}"><input aria-label="RIR série ${setIndex + 1}" type="number" inputmode="numeric" min="0" max="10" placeholder="${esc(previousSet?.rir ?? "—")}" value="${esc(set.rir)}" data-set-field="rir" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}"><button class="btn btn-icon btn-sm warmup-toggle" type="button" data-action="toggle-warmup" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}" aria-pressed="${set.warmup ? "true" : "false"}" aria-label="Marquer comme série d’échauffement">W</button></div>${(set.drops || []).map((drop, dropIndex) => `<div class="drop-row"><span class="drop-index">↳ D${dropIndex + 1}</span><input aria-label="Charge drop ${dropIndex + 1} de la série ${setIndex + 1}" type="number" inputmode="decimal" min="0" step="0.5" placeholder="kg" value="${esc(drop.weight)}" data-drop-field="weight" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}" data-drop-index="${dropIndex}"><input aria-label="Répétitions drop ${dropIndex + 1} de la série ${setIndex + 1}" type="number" inputmode="numeric" min="0" max="100" placeholder="reps" value="${esc(drop.reps)}" data-drop-field="reps" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}" data-drop-index="${dropIndex}"><span class="drop-link">sans<br>repos</span><button class="btn btn-icon btn-sm btn-danger" type="button" data-action="remove-drop" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}" data-drop-index="${dropIndex}" aria-label="Supprimer le drop ${dropIndex + 1}">×</button></div>`).join("")}<button class="btn btn-sm drop-add" type="button" data-action="add-drop" data-exercise-index="${exerciseIndex}" data-set-index="${setIndex}">↳ + Drop</button></div>`;
              }).join("")}
            </div>
            <div class="exercise-foot">
              <button class="btn btn-sm" type="button" data-action="add-set" data-exercise-index="${exerciseIndex}">＋ Série</button>
              ${exercise.sets.length > 1 ? `<button class="btn btn-sm btn-ghost" type="button" data-action="remove-last-set" data-exercise-index="${exerciseIndex}">Retirer la dernière</button>` : ""}
              <details class="options"><summary>Réglages et note exercice</summary><div class="stack"><div class="field"><label>Mode de charge</label><select data-exercise-field="loadType" data-exercise-index="${exerciseIndex}"><option value="total" ${exercise.loadType === "total" ? "selected" : ""}>Charge totale</option><option value="perSide" ${exercise.loadType === "perSide" ? "selected" : ""}>Charge par côté (tonnage ×2)</option><option value="bodyweightPlus" ${exercise.loadType === "bodyweightPlus" ? "selected" : ""}>Poids du corps + lest</option></select></div><div class="field"><label>Note</label><textarea data-exercise-field="comments" data-exercise-index="${exerciseIndex}" placeholder="Repères de placement, machine, amplitude…">${esc(exercise.comments)}</textarea></div></div></details>
            </div>
          </article>`;
      }

      function feedbackSelect(key, label, min, max, value) {
        const options = [];
        for (let index = min; index <= max; index += 1) options.push(`<option value="${index}" ${finiteNumber(value) === index ? "selected" : ""}>${index}/${max}</option>`);
        return `<div class="field"><label for="feedback-${key}">${label}</label><select id="feedback-${key}" data-feedback-field="${key}">${options.join("")}</select></div>`;
      }

      function renderStats() {
        const sessions = sessionsForPeriod(statsDays);
        if (!sessions.length) {
          return `<section class="page"><div><p class="eyebrow">Analyses</p><h1>Tes statistiques</h1></div><div class="card empty"><div class="empty-inner"><span class="empty-icon" aria-hidden="true">↗</span><h2>Pas encore assez de données</h2><p class="muted">Une seule séance suffit pour afficher ton tonnage, tes séries et tes premiers records.</p><button class="btn btn-primary" type="button" data-action="navigate" data-view="workout">Enregistrer une séance</button></div></div></section>`;
        }
        const totalTonnage = sessions.reduce((sum, session) => sum + sessionTonnage(session), 0);
        const totalSets = sessions.reduce((sum, session) => sum + sessionWorkSets(session), 0);
        const totalReps = sessions.reduce((sum, session) => sum + sessionReps(session), 0);
        const totalDropSets = sessions.reduce((sum, session) => sum + sessionDropSets(session), 0);
        const totalDropSegments = sessions.reduce((sum, session) => sum + sessionDropSegments(session), 0);
        const avgDuration = sessions.reduce((sum, session) => sum + finiteNumber(session.durationMin), 0) / sessions.length;
        const earliest = dateFromYmd(sessions[0].date);
        const spanDays = statsDays || Math.max(1, Math.ceil((new Date() - earliest) / 86400000) + 1);
        const weeks = Math.max(1, spanDays / 7);
        const avgWeekSessions = sessions.length / weeks;
        const avgEffort = sessions.reduce((sum, session) => sum + finiteNumber(session.feedback?.effort), 0) / sessions.length;
        const avgPain = sessions.reduce((sum, session) => sum + finiteNumber(session.feedback?.pain), 0) / sessions.length;
        const weekly = weeklyAggregates(sessions);
        const muscles = muscleSets(sessions);
        const exerciseOptions = uniqueExercises(sessions);
        if (!selectedExercise || !exerciseOptions.some(exercise => exercise.id === selectedExercise)) selectedExercise = exerciseOptions[0]?.id || "";
        const exerciseTrend = exerciseProgress(sessions, selectedExercise);
        const bestE1rm = Math.max(0, ...exerciseTrend.map(point => point.value));
        const selectedMeta = exerciseOptions.find(exercise => exercise.id === selectedExercise);

        return `
          <section class="page">
            <div class="section-head"><div><p class="eyebrow">Analyses</p><h1>Tes statistiques</h1></div><div class="field"><label for="stats-period">Période</label><select id="stats-period" data-stats-period><option value="28" ${statsDays === 28 ? "selected" : ""}>4 semaines</option><option value="56" ${statsDays === 56 ? "selected" : ""}>8 semaines</option><option value="84" ${statsDays === 84 ? "selected" : ""}>12 semaines</option><option value="0" ${statsDays === 0 ? "selected" : ""}>Tout</option></select></div></div>
            <div class="kpi-grid">
              <div class="card kpi"><span class="kpi-label">Tonnage moyen / séance</span><strong class="kpi-value">${compactWeight(totalTonnage / sessions.length)}<span class="kpi-unit">kg</span></strong><span class="small muted">${compactWeight(totalTonnage)} kg au total</span></div>
              <div class="card kpi"><span class="kpi-label">Séries moyennes / séance</span><strong class="kpi-value">${formatNumber(totalSets / sessions.length, 1)}</strong><span class="small muted">${totalSets} séries de travail</span></div>
              <div class="card kpi"><span class="kpi-label">Répétitions / série</span><strong class="kpi-value">${formatNumber(totalSets ? totalReps / totalSets : 0, 1)}</strong><span class="small muted">${totalReps} répétitions</span></div>
              <div class="card kpi"><span class="kpi-label">Fréquence moyenne</span><strong class="kpi-value">${formatNumber(avgWeekSessions, 1)}<span class="kpi-unit">/sem.</span></strong><span class="small muted">durée moy. ${formatNumber(avgDuration, 0)} min</span></div>
            </div>
            <div class="row"><span class="badge accent">${totalDropSets} série${totalDropSets > 1 ? "s" : ""} dégressive${totalDropSets > 1 ? "s" : ""}</span><span class="badge">${totalDropSegments} palier${totalDropSegments > 1 ? "s" : ""} de baisse</span><span class="small muted">Une série avec plusieurs drops reste comptée comme une seule série de travail.</span></div>

            <div class="card stack"><div class="section-head"><div><p class="eyebrow">Tendance</p><h2>Tonnage par semaine</h2></div><span class="badge">${weekly.length} semaines</span></div>${barChart(weekly.map(item => ({ label: formatDate(item.week), value: item.tonnage })), "kg")}</div>

            <div class="card stack"><div class="section-head"><div><p class="eyebrow">Volume</p><h2>Séries moyennes / semaine</h2></div><span class="badge">cible du programme</span></div>${MUSCLES.map(muscle => {
              const average = muscles[muscle.id] / weeks;
              const percent = muscle.target ? average / muscle.target * 100 : 0;
              return `<div class="muscle-row"><div class="muscle-row-head"><span>${muscle.short}</span><span class="muted">${formatNumber(average, 1)} / ${muscle.target} · ${formatNumber(percent, 0)}%</span></div><div class="progress ${percent > 110 ? "over" : ""}"><span style="width:${Math.min(percent, 100)}%"></span></div></div>`;
            }).join("")}</div>

            <div class="card stack">
              <div class="section-head"><div><p class="eyebrow">Force estimée</p><h2>Progression par exercice</h2></div></div>
              <div class="field"><label for="exercise-stat">Exercice</label><select id="exercise-stat" data-exercise-stat>${exerciseOptions.map(exercise => `<option value="${esc(exercise.id)}" ${exercise.id === selectedExercise ? "selected" : ""}>${esc(exercise.name)}</option>`).join("")}</select></div>
              ${exerciseTrend.length ? `${lineChart(exerciseTrend, "kg")}<div class="row"><span class="badge accent">Meilleur e1RM : ${formatNumber(bestE1rm, 1)} kg</span><span class="badge">${selectedMeta?.loadType === "perSide" ? "par côté" : "charge saisie"}</span></div>` : `<p class="muted">Renseigne charge et répétitions pour calculer l’e1RM.</p>`}
            </div>

            <div class="card stack"><div><p class="eyebrow">Récupération</p><h2>Signaux moyens</h2></div><div class="kpi-grid"><div class="kpi"><span class="kpi-label">Effort global</span><strong class="kpi-value">${formatNumber(avgEffort, 1)}<span class="kpi-unit">/10</span></strong></div><div class="kpi"><span class="kpi-label">Gêne / douleur</span><strong class="kpi-value">${formatNumber(avgPain, 1)}<span class="kpi-unit">/10</span></strong></div></div>${avgPain >= 4 ? `<div class="notice warning">Ta gêne moyenne est élevée sur la période. Identifie les exercices concernés dans tes commentaires et adapte la charge ou l’amplitude si nécessaire.</div>` : ""}</div>
            <div class="notice"><strong>Lecture utile :</strong> compare surtout le tonnage et l’e1RM d’un même exercice. Deux machines différentes ne produisent pas des charges directement comparables.</div>
          </section>`;
      }

      function weeklyAggregates(sessions) {
        const map = new Map();
        sessions.forEach(session => {
          const key = weekKey(session.date);
          if (!map.has(key)) map.set(key, { week: key, tonnage: 0, sets: 0, sessions: 0 });
          const bucket = map.get(key);
          bucket.tonnage += sessionTonnage(session);
          bucket.sets += sessionWorkSets(session);
          bucket.sessions += 1;
        });
        return [...map.values()].sort((a, b) => a.week.localeCompare(b.week));
      }

      function uniqueExercises(sessions) {
        const map = new Map();
        sessions.forEach(session => (session.exercises || []).forEach(exercise => {
          if (!map.has(exercise.id)) map.set(exercise.id, { id: exercise.id, name: exercise.name, loadType: exercise.loadType });
        }));
        return [...map.values()].sort((a, b) => a.name.localeCompare(b.name, "fr"));
      }

      function exerciseProgress(sessions, exerciseId) {
        return sessions.map(session => ({ label: formatDate(session.date), rawDate: session.date, value: sessionBestE1rm(session, exerciseId) })).filter(point => point.value > 0);
      }

      function barChart(points, unit) {
        if (!points.length) return `<p class="muted">Aucune donnée.</p>`;
        const width = 680, height = 240, left = 48, right = 14, top = 18, bottom = 42;
        const innerWidth = width - left - right, innerHeight = height - top - bottom;
        const max = Math.max(...points.map(point => point.value), 1);
        const gap = Math.max(6, innerWidth / points.length * .18);
        const barWidth = Math.max(6, innerWidth / points.length - gap);
        const grid = [0, .5, 1].map(ratio => {
          const y = top + innerHeight - ratio * innerHeight;
          return `<line class="chart-grid" x1="${left}" y1="${y}" x2="${width - right}" y2="${y}"></line><text class="chart-axis" x="${left - 8}" y="${y + 4}" text-anchor="end">${compactWeight(max * ratio)}</text>`;
        }).join("");
        const bars = points.map((point, index) => {
          const x = left + index * innerWidth / points.length + gap / 2;
          const h = point.value / max * innerHeight;
          const y = top + innerHeight - h;
          const label = points.length > 8 && index % 2 ? "" : point.label.replace(/\./g, "");
          return `<rect class="chart-bar" x="${x}" y="${y}" width="${barWidth}" height="${h}" rx="5"><title>${esc(point.label)} : ${formatNumber(point.value, 0)} ${unit}</title></rect><text class="chart-axis" x="${x + barWidth / 2}" y="${height - 16}" text-anchor="middle">${esc(label)}</text>`;
        }).join("");
        return `<div class="chart-wrap"><svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Tonnage hebdomadaire en kilogrammes"><title>Tonnage hebdomadaire</title>${grid}${bars}</svg></div>`;
      }

      function lineChart(points, unit) {
        if (!points.length) return "";
        const width = 680, height = 240, left = 48, right = 18, top = 20, bottom = 42;
        const innerWidth = width - left - right, innerHeight = height - top - bottom;
        const values = points.map(point => point.value);
        const max = Math.max(...values), min = Math.min(...values);
        const padding = Math.max(2, (max - min) * .18);
        const low = Math.max(0, min - padding), high = max + padding;
        const xFor = index => points.length === 1 ? left + innerWidth / 2 : left + index / (points.length - 1) * innerWidth;
        const yFor = value => top + innerHeight - (value - low) / Math.max(1, high - low) * innerHeight;
        const path = points.map((point, index) => `${index ? "L" : "M"}${xFor(index).toFixed(1)},${yFor(point.value).toFixed(1)}`).join(" ");
        const grid = [0, .5, 1].map(ratio => {
          const value = low + (high - low) * ratio;
          const y = yFor(value);
          return `<line class="chart-grid" x1="${left}" y1="${y}" x2="${width - right}" y2="${y}"></line><text class="chart-axis" x="${left - 8}" y="${y + 4}" text-anchor="end">${formatNumber(value, 0)}</text>`;
        }).join("");
        const dots = points.map((point, index) => `<circle class="chart-dot" cx="${xFor(index)}" cy="${yFor(point.value)}" r="5"><title>${esc(point.label)} : ${formatNumber(point.value, 1)} ${unit}</title></circle>${(points.length <= 8 || index === 0 || index === points.length - 1) ? `<text class="chart-axis" x="${xFor(index)}" y="${height - 16}" text-anchor="middle">${esc(point.label.replace(/\./g, ""))}</text>` : ""}`).join("");
        return `<div class="chart-wrap"><svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Progression de la force estimée"><title>Progression e1RM</title>${grid}<path class="chart-line" d="${path}"></path>${dots}</svg></div>`;
      }

      function renderData() {
        const sessions = getSortedSessions().reverse();
        const standalone = window.matchMedia?.("(display-mode: standalone)").matches || window.navigator.standalone;
        return `
          <section class="page">
            <div><p class="eyebrow">Sauvegarde et réglages</p><h1>Tes données</h1><p class="muted">Tout reste sur cet appareil. Aucune séance n’est envoyée sur un serveur.</p></div>
            <div class="card stack">
              <div><p class="eyebrow">Profil</p><h2>Calcul du tonnage</h2></div>
              <div class="form-grid"><div class="field"><label for="bodyweight">Poids du corps (kg)</label><input id="bodyweight" type="number" inputmode="decimal" min="20" max="300" step="0.1" value="${esc(state.settings.bodyweightKg)}" data-setting="bodyweightKg"></div><div class="field"><label for="target-sessions">Séances cibles / semaine</label><input id="target-sessions" type="number" inputmode="numeric" min="1" max="14" value="${esc(state.settings.targetSessionsWeek)}" data-setting="targetSessionsWeek"></div></div>
              <p class="small muted">Le poids du corps est ajouté au lest pour les dips. Les exercices “par côté” multiplient la charge par 2 pour le tonnage.</p>
            </div>
            <div class="card stack">
              <div><p class="eyebrow">Sauvegarde</p><h2>Exporter ou restaurer</h2></div>
              <div class="row"><button class="btn btn-primary" type="button" data-action="export-json">Exporter une sauvegarde</button><button class="btn" type="button" data-action="export-csv">Exporter en CSV</button><button class="btn" type="button" data-action="import-json">Restaurer un fichier</button></div>
              <div class="notice warning"><strong>Important :</strong> les données sont locales. Exporte régulièrement une sauvegarde JSON, surtout avant de changer de téléphone, vider Safari/Chrome ou désinstaller l’app.</div>
            </div>
            <div class="card stack">
              <div class="row-between"><div><p class="eyebrow">Installation</p><h2>${standalone ? "App installée" : "Ajouter à l’écran d’accueil"}</h2></div><span class="badge ${standalone ? "accent" : ""}">${standalone ? "Mode app" : "Navigateur"}</span></div>
              ${standalone ? `<p class="muted">VOLUME est lancé en mode autonome et fonctionne hors ligne après son premier chargement.</p>` : `${installNotice()}<p class="small muted">L’installation nécessite une adresse web sécurisée (HTTPS). Une fois ouverte et ajoutée à l’écran d’accueil, l’app fonctionne hors connexion.</p>`}
            </div>
            <div class="section-head"><div><p class="eyebrow">Historique</p><h2>${sessions.length} séance${sessions.length > 1 ? "s" : ""}</h2></div></div>
            ${sessions.length ? `<div class="card list-divider">${sessions.map(session => `<div class="history-item"><div class="row-between"><div><h3>${esc(session.name)}</h3><p class="small muted">${formatDate(session.date, true)} · ${finiteNumber(session.durationMin)} min</p></div><div class="history-actions"><button class="btn btn-sm" type="button" data-action="duplicate-session" data-session-id="${esc(session.id)}">Dupliquer</button><button class="btn btn-sm btn-danger" type="button" data-action="delete-session" data-session-id="${esc(session.id)}">Supprimer</button></div></div><div class="row"><span class="badge accent">${sessionWorkSets(session)} séries</span><span class="badge">${compactWeight(sessionTonnage(session))} kg</span><span class="badge">${sessionReps(session)} reps</span>${sessionDropSegments(session) ? `<span class="badge accent">${sessionDropSegments(session)} drop${sessionDropSegments(session) > 1 ? "s" : ""}</span>` : ""}</div>${session.comments ? `<p class="small muted">${esc(session.comments)}</p>` : ""}</div>`).join("")}</div>` : `<div class="card empty"><div class="empty-inner"><span class="empty-icon">≡</span><h3>Aucune séance enregistrée</h3><p class="muted">Ton historique apparaîtra ici.</p></div></div>`}
            ${sessions.length ? `<button class="btn btn-danger btn-block" type="button" data-action="reset-data">Effacer toutes les données</button>` : ""}
            <p class="small muted">VOLUME ${APP_VERSION} · stockage local hors ligne</p>
          </section>`;
      }

      function updateLiveSummary() {
        if (!state.draft) return;
        const setEl = root.querySelector("#live-set-count");
        const tonnageEl = root.querySelector("#live-tonnage");
        const dropEl = root.querySelector("#live-drop-count");
        const timeEl = root.querySelector("#live-time");
        if (setEl) setEl.textContent = sessionWorkSets(state.draft);
        if (tonnageEl) tonnageEl.textContent = compactWeight(sessionTonnage(state.draft));
        if (dropEl) dropEl.textContent = sessionDropSegments(state.draft);
        if (timeEl) timeEl.textContent = Math.max(0, Math.round((Date.now() - new Date(state.draft.startedAt).getTime()) / 60000));
        updateHeader();
      }

      function finishWorkout() {
        const draft = state.draft;
        if (!draft) return;
        if (sessionWorkSets(draft) === 0) {
          showToast("Renseigne au moins une série de travail.");
          return;
        }
        const endedAt = new Date();
        const autoDuration = Math.max(1, Math.round((endedAt.getTime() - new Date(draft.startedAt).getTime()) / 60000));
        const session = {
          ...draft,
          id: uid("session"),
          endedAt: endedAt.toISOString(),
          durationMin: finiteNumber(draft.durationOverride, autoDuration)
        };
        delete session.durationOverride;
        session.exercises.forEach((exercise, index) => { exercise.order = index + 1; });
        state.sessions.push(session);
        state.draft = null;
        saveState();
        currentView = "home";
        render();
        showToast(`${session.name} enregistrée · ${sessionWorkSets(session)} séries`);
      }

      function duplicateSession(sessionId) {
        const source = state.sessions.find(session => session.id === sessionId);
        if (!source) return;
        if (state.draft && !window.confirm("Remplacer la séance en cours ?")) return;
        const now = new Date();
        state.draft = {
          ...structuredClone(source),
          id: uid("draft"),
          date: localDateString(now),
          startedAt: now.toISOString(),
          durationOverride: "",
          comments: "",
          exercises: source.exercises.map((exercise, exerciseIndex) => ({
            ...structuredClone(exercise),
            instanceId: uid("exercise"),
            order: exerciseIndex + 1,
            comments: "",
            sets: exercise.sets.map(() => ({ id: uid("set"), weight: "", reps: "", rir: "", warmup: false, drops: [] }))
          }))
        };
        delete state.draft.endedAt;
        delete state.draft.durationMin;
        saveState();
        navigate("workout");
      }

      function downloadFile(filename, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }

      function exportJson() {
        const payload = { app: "VOLUME", exportedAt: new Date().toISOString(), ...state };
        downloadFile(`volume-sauvegarde-${localDateString()}.json`, JSON.stringify(payload, null, 2), "application/json");
        showToast("Sauvegarde JSON exportée.");
      }

      function csvCell(value) {
        const text = String(value ?? "");
        return /[;"\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
      }

      function exportCsv() {
        const headers = ["date", "seance", "duree_min", "ordre_exercice", "exercice", "groupe", "serie", "palier", "type_palier", "charge_saisie_kg", "repetitions", "rir", "echauffement", "mode_charge", "charge_effective_kg", "tonnage_kg", "effort_global", "energie", "performance", "congestion", "douleur", "commentaire_seance", "commentaire_exercice"];
        const rows = [headers];
        getSortedSessions().forEach(session => (session.exercises || []).forEach((exercise, exerciseIndex) => (exercise.sets || []).forEach((set, setIndex) => {
          const components = [
            { palier: 0, type: "principale", weight: set.weight, reps: set.reps, rir: set.rir },
            ...(set.drops || []).map((drop, dropIndex) => ({ palier: dropIndex + 1, type: `drop ${dropIndex + 1}`, weight: drop.weight, reps: drop.reps, rir: "" }))
          ];
          components.forEach(component => rows.push([
            session.date, session.name, session.durationMin, exerciseIndex + 1, exercise.name, muscleMap[exercise.muscle]?.label || exercise.muscle, setIndex + 1, component.palier, component.type, component.weight, component.reps, component.rir, set.warmup ? "oui" : "non", loadTypeLabel(exercise.loadType), finiteNumber(component.reps) > 0 ? effectiveLoad(component.weight, exercise.loadType) : "", componentTonnage(component.weight, component.reps, exercise, set.warmup), session.feedback?.effort, session.feedback?.energy, session.feedback?.performance, session.feedback?.pump, session.feedback?.pain, session.comments, exercise.comments
          ]));
        })));
        const csv = "\ufeff" + rows.map(row => row.map(csvCell).join(";")).join("\n");
        downloadFile(`volume-donnees-${localDateString()}.csv`, csv, "text/csv;charset=utf-8");
        showToast("Export CSV créé.");
      }

      function importJson(file) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (!Array.isArray(parsed.sessions)) throw new Error("Format invalide");
            if (!window.confirm(`Restaurer ${parsed.sessions.length} séance(s) ? Les données actuelles seront remplacées.`)) return;
            state = normalizeState(parsed);
            saveState();
            render();
            showToast("Sauvegarde restaurée.");
          } catch (error) {
            showToast("Ce fichier n’est pas une sauvegarde VOLUME valide.");
          }
        };
        reader.readAsText(file);
      }

      root.addEventListener("click", event => {
        const button = event.target.closest("[data-action]");
        if (!button) return;
        const action = button.dataset.action;
        if (action === "navigate") navigate(button.dataset.view);
        if (action === "start-session") createDraft(button.dataset.program);
        if (action === "finish-workout") finishWorkout();
        if (action === "discard-draft") {
          if (window.confirm("Abandonner cette séance ? Les saisies en cours seront perdues.")) { state.draft = null; saveState(); render(); }
        }
        if (action === "add-set" && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(button.dataset.exerciseIndex)];
          exercise.sets.push({ id: uid("set"), weight: "", reps: "", rir: "", warmup: false, drops: [] });
          saveState(); render();
        }
        if (action === "remove-last-set" && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(button.dataset.exerciseIndex)];
          if (exercise.sets.length > 1) exercise.sets.pop();
          saveState(); render();
        }
        if (action === "toggle-warmup" && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(button.dataset.exerciseIndex)];
          const set = exercise.sets[finiteNumber(button.dataset.setIndex)];
          set.warmup = !set.warmup;
          button.setAttribute("aria-pressed", set.warmup ? "true" : "false");
          saveState(); updateLiveSummary();
        }
        if (action === "add-drop" && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(button.dataset.exerciseIndex)];
          const set = exercise?.sets?.[finiteNumber(button.dataset.setIndex)];
          if (set) {
            if (!Array.isArray(set.drops)) set.drops = [];
            set.drops.push({ id: uid("drop"), weight: "", reps: "" });
            saveState(); render();
          }
        }
        if (action === "remove-drop" && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(button.dataset.exerciseIndex)];
          const set = exercise?.sets?.[finiteNumber(button.dataset.setIndex)];
          const dropIndex = finiteNumber(button.dataset.dropIndex);
          if (set?.drops?.[dropIndex]) {
            set.drops.splice(dropIndex, 1);
            saveState(); render();
          }
        }
        if (action === "move-exercise" && state.draft) {
          const index = finiteNumber(button.dataset.index);
          const nextIndex = index + finiteNumber(button.dataset.direction);
          if (nextIndex >= 0 && nextIndex < state.draft.exercises.length) {
            const [exercise] = state.draft.exercises.splice(index, 1);
            state.draft.exercises.splice(nextIndex, 0, exercise);
            saveState(); render();
          }
        }
        if (action === "open-custom") {
          root.querySelector("#custom-muscle").innerHTML = MUSCLES.map(muscle => `<option value="${muscle.id}">${muscle.label}</option>`).join("") + `<option value="other">Autre</option>`;
          customForm.reset();
          root.querySelector("#custom-sets").value = 3;
          if (typeof customDialog.showModal === "function") customDialog.showModal();
          else customDialog.setAttribute("open", "");
        }
        if (action === "close-custom") customDialog.close();
        if (action === "export-json") exportJson();
        if (action === "export-csv") exportCsv();
        if (action === "import-json") importInput.click();
        if (action === "duplicate-session") duplicateSession(button.dataset.sessionId);
        if (action === "delete-session") {
          const session = state.sessions.find(item => item.id === button.dataset.sessionId);
          if (session && window.confirm(`Supprimer définitivement ${session.name} du ${formatDate(session.date, true)} ?`)) {
            state.sessions = state.sessions.filter(item => item.id !== session.id); saveState(); render(); showToast("Séance supprimée.");
          }
        }
        if (action === "reset-data") {
          if (window.confirm("Effacer toutes les séances et la séance en cours ? Cette action est irréversible.")) {
            const settings = state.settings; state = defaultState(); state.settings = settings; saveState(); render(); showToast("Toutes les données ont été effacées.");
          }
        }
        if (action === "install" && installPrompt) {
          installPrompt.prompt();
          installPrompt.userChoice.finally(() => { installPrompt = null; render(); });
        }
      });

      root.addEventListener("input", event => {
        const target = event.target;
        if (target.dataset.setField && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(target.dataset.exerciseIndex)];
          const set = exercise?.sets?.[finiteNumber(target.dataset.setIndex)];
          if (set) { set[target.dataset.setField] = target.value; saveState(); updateLiveSummary(); }
        }
        if (target.dataset.dropField && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(target.dataset.exerciseIndex)];
          const set = exercise?.sets?.[finiteNumber(target.dataset.setIndex)];
          const drop = set?.drops?.[finiteNumber(target.dataset.dropIndex)];
          if (drop) { drop[target.dataset.dropField] = target.value; saveState(); updateLiveSummary(); }
        }
        if (target.dataset.draftField && state.draft) {
          state.draft[target.dataset.draftField] = target.value; saveState();
        }
        if (target.dataset.exerciseField && state.draft) {
          const exercise = state.draft.exercises[finiteNumber(target.dataset.exerciseIndex)];
          if (exercise) { exercise[target.dataset.exerciseField] = target.value; saveState(); updateLiveSummary(); }
        }
        if (target.dataset.setting) {
          state.settings[target.dataset.setting] = finiteNumber(target.value, state.settings[target.dataset.setting]); saveState();
        }
      });

      root.addEventListener("change", event => {
        const target = event.target;
        if (target.dataset.feedbackField && state.draft) { state.draft.feedback[target.dataset.feedbackField] = finiteNumber(target.value); saveState(); }
        if (target.hasAttribute("data-stats-period")) { statsDays = finiteNumber(target.value); render(); }
        if (target.hasAttribute("data-exercise-stat")) { selectedExercise = target.value; render(); }
      });

      customForm.addEventListener("submit", event => {
        event.preventDefault();
        if (!state.draft) return;
        const data = new FormData(customForm);
        const plannedSets = Math.max(1, Math.min(12, finiteNumber(data.get("sets"), 3)));
        const name = String(data.get("name") || "Exercice").trim();
        state.draft.exercises.push({
          id: `custom-${name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || uid("exercise")}`,
          instanceId: uid("exercise"), name, plannedSets, muscle: String(data.get("muscle")), loadType: String(data.get("loadType")), order: state.draft.exercises.length + 1, comments: "",
          sets: Array.from({ length: plannedSets }, () => ({ id: uid("set"), weight: "", reps: "", rir: "", warmup: false, drops: [] }))
        });
        saveState(); customDialog.close(); render(); showToast(`${name} ajouté.`);
      });

      importInput.addEventListener("change", () => {
        const file = importInput.files?.[0];
        if (file) importJson(file);
        importInput.value = "";
      });

      window.addEventListener("beforeinstallprompt", event => {
        event.preventDefault(); installPrompt = event; render();
      });

      if ("serviceWorker" in navigator && /^https?:$/.test(location.protocol)) {
        window.addEventListener("load", () => navigator.serviceWorker.register("./service-worker.js").catch(() => {}));
      }

      window.setInterval(updateLiveSummary, 60000);
      render();
    })();
  </script>
</div>

<script id="codex-visualization-tooltip">/* oxlint-disable typescript/no-unsafe-argument, typescript/no-unsafe-call, typescript/no-unsafe-return */
// Runs inside the visualization sandbox, not the host webview.
(() => {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =>
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =>
    target?.nodeType != null && trigger.contains(target);
  const getContent = (trigger) =>
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) => {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () => {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) => {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () => {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) => {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) => {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) => {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() => {
        if (activeTrigger === trigger && request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) => {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () => {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) => {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() < skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() => {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) => {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) => {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) => {
    if (event.key === "Escape") {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) => {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () => {
    closeTooltip(false);
    document.removeEventListener("pointerover", handlePointerOpen);
    document.removeEventListener("pointerout", handleLeave);
    document.removeEventListener("focusin", handleFocusIn);
    document.removeEventListener("focusout", handleLeave);
    document.removeEventListener("keydown", handleKeyDown);
    document.removeEventListener("contextmenu", handleContextMenu);
    tooltip = null;
  };

  document.addEventListener("pointerover", handlePointerOpen);
  document.addEventListener("pointerout", handleLeave);
  document.addEventListener("focusin", handleFocusIn);
  document.addEventListener("focusout", handleLeave);
  document.addEventListener("keydown", handleKeyDown);
  document.addEventListener("contextmenu", handleContextMenu);
  window.addEventListener("pagehide", destroy, { once: true });
})();
</script>
<script id="codex-visualization-lucide-initialization">(() => {
  const initialize = () => {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById("codex-visualization-lucide")
    ?.addEventListener("load", initialize, { once: true });
})();
</script>
